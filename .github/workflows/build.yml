name: Build and Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── 1. Lint + unit tests ──────────────────────────────────────────────────────
  test:
    name: Test on ${{ matrix.os }} / Node ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: ESLint security scan
        run: npm run lint:security
        continue-on-error: true

  # ── 2. Cross-platform build ───────────────────────────────────────────────────
  build:
    name: Build on ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact-name: windows-build
          - os: ubuntu-latest
            platform: linux
            artifact-name: linux-build
          - os: macos-latest
            platform: mac
            artifact-name: macos-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Rebuild native modules for Electron ABI
        run: npx @electron/rebuild -f -w better-sqlite3

      # ── macOS code signing ────────────────────────────────────────────────────
      - name: Import macOS signing certificate
        if: matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm -f certificate.p12
          echo "CSC_KEYCHAIN=build.keychain" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=$APPLE_CERTIFICATE_PASSWORD" >> $GITHUB_ENV
          echo "✅ macOS certificate imported"

      # ── Windows code signing ──────────────────────────────────────────────────
      - name: Prepare Windows signing certificate
        if: matrix.os == 'windows-latest' && secrets.WIN_CSC_LINK != ''
        run: echo "✅ Windows certificate available — signing enabled"

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build for ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }} -- --publish never
        env:
          # macOS: pass certificate via env (electron-builder picks up CSC_LINK or keychain)
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # macOS notarisation — only active when Apple secrets are set
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows Authenticode signing
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      # ── Linux GPG signing ─────────────────────────────────────────────────────
      - name: Sign Linux artifacts with GPG
        if: matrix.os == 'ubuntu-latest' && secrets.LINUX_GPG_PRIVATE_KEY != ''
        env:
          LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
          LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
        run: |
          # Import private key
          echo "$LINUX_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          echo "✅ GPG key imported"

          # Sign every artifact in dist/
          for f in dist/*.AppImage dist/*.deb; do
            [ -f "$f" ] || continue
            gpg --batch --yes --detach-sign --armor \
              --local-user "$LINUX_GPG_KEY_ID" "$f"
            echo "Signed: $f → $f.asc"
          done

          # Export public key alongside artifacts for user verification
          gpg --export --armor "$LINUX_GPG_KEY_ID" > dist/richmond-hotel-signing.pub.asc
          echo "✅ All Linux artifacts signed"

      - name: List build output
        run: ls -la dist/
        shell: bash

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.asc
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 30

  # ── 3. GitHub Release (tags only) ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/windows-build/*
            release-artifacts/linux-build/*
            release-artifacts/macos-build/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Richmond Hotel Management System ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Description |
            |----------|------|-------------|
            | Windows  | `*.exe` | NSIS installer (x64) — Authenticode signed |
            | macOS    | `*.dmg` | Disk image (x64 + arm64 universal) — code signed |
            | Linux    | `*.AppImage` | Portable (all distros) — GPG signed |
            | Linux    | `*.deb` | Debian/Ubuntu package — GPG signed |

            ### Verifying Linux downloads
            ```bash
            # Import the public key
            gpg --import richmond-hotel-signing.pub.asc

            # Verify AppImage
            gpg --verify Richmond.Hotel.Manager-*.AppImage.asc Richmond.Hotel.Manager-*.AppImage
            ```

            ### What's New
            See the auto-generated release notes below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Status summary ─────────────────────────────────────────────────────────
  notify:
    name: Build Summary
    needs: [test, build]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Report status
        run: |
          echo "Test: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ All platforms built successfully"
          else
            echo "❌ Build failed — check logs"
            exit 1
          fi
        shell: bash
