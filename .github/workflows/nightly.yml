name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'   # Every night at 2 AM UTC
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        default: 'main'
        required: false

jobs:
  nightly-build:
    name: Nightly Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron ABI
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: Run security audit
        run: npm audit --production
        continue-on-error: true

      - name: Check for dependency updates
        run: npm outdated
        continue-on-error: true

      - name: Build application (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win -- --publish never

      - name: Build application (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build:mac -- --publish never

      - name: Build application (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux -- --publish never

      - name: Upload nightly build
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.os }}-${{ github.run_number }}
          path: dist/
          retention-days: 7

  dependency-update-check:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Check for updates
        run: ncu
        continue-on-error: true

      - name: Create issue for outdated dependencies
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            
            try {
              const outdated = execSync('npm outdated --json', { encoding: 'utf-8' });
              const packages = JSON.parse(outdated || '{}');
              
              if (Object.keys(packages).length > 0) {
                let body = '## Outdated Dependencies Report\n\n';
                body += '| Package | Current | Wanted | Latest |\n';
                body += '|---------|---------|--------|--------|\n';
                
                for (const [name, info] of Object.entries(packages)) {
                  body += `| ${name} | ${info.current} | ${info.wanted} | ${info.latest} |\n`;
                }
                
                body += '\n🤖 Auto-generated by nightly build';
                
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `[Nightly] Outdated Dependencies - ${new Date().toISOString().split('T')[0]}`,
                  body: body,
                  labels: ['dependencies', 'automated']
                });
              }
            } catch (error) {
              console.log('No outdated dependencies or error checking:', error.message);
            }
