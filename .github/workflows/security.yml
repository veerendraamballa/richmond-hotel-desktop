name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 9 * * 1'   # Weekly Monday 9 AM UTC
  workflow_dispatch:

jobs:
  # ── 1. Static Analysis ────────────────────────────────────────────────────────
  static-analysis:
    name: Static Security Analysis (ESLint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Run ESLint security plugin
        run: npm run lint:security
        continue-on-error: true   # Report but don't block CI until baseline is clean

      - name: ESLint output as annotation
        run: npx eslint main.js preload.js renderer/app.js --format json > eslint-report.json || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-security-report
          path: eslint-report.json
          retention-days: 30

  # ── 2. Dependency Vulnerability Scan ─────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan (npm audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: npm audit (high+critical only, fail on critical)
        run: npm audit --production --audit-level=critical
        continue-on-error: true

      - name: npm audit JSON report
        run: npm audit --production --json > audit-results.json || true

      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-results.json
          retention-days: 30

  # ── 3. CodeQL ─────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Deep Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── 4. E2E Security Tests ─────────────────────────────────────────────────────
  security-e2e:
    name: E2E Security Tests (XSS / SQLi / IPC)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci
      - name: Rebuild native modules for Electron ABI
        run: npx @electron/rebuild -f -w better-sqlite3
      - run: npx playwright install --with-deps chromium

      - name: Install Xvfb (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y xvfb

      - name: Run security E2E tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npx playwright test tests/e2e/security/
        env:
          CI: true

      - name: Run security E2E tests (Windows)
        if: matrix.os == 'windows-latest'
        run: npx playwright test tests/e2e/security/
        env:
          CI: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-e2e-results-${{ matrix.os }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  # ── 5. License Compliance ─────────────────────────────────────────────────────
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Check licenses
        run: |
          npx license-checker --summary
          npx license-checker --json > licenses.json
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30

  # ── 6. Create Issue on Critical Failure ───────────────────────────────────────
  create-security-issue:
    name: Create Security Issue on Failure
    needs: [dependency-scan, security-e2e]
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    permissions:
      issues: write

    steps:
      - name: Create security issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Scan failure detected - ${date}`,
              body: `## Security Scan Alert\n\n` +
                `One or more security checks failed on \`main\`.\n\n` +
                `**Checks run:**\n` +
                `- npm audit (dependency vulnerabilities)\n` +
                `- E2E security tests (XSS, SQL injection, IPC hardening)\n\n` +
                `**Action Required:**\n` +
                `1. Review artifacts in the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n` +
                `2. Fix identified vulnerabilities\n` +
                `3. Re-run the security workflow\n\n` +
                `🤖 Auto-created by Security Scan workflow`,
              labels: ['security', 'critical', 'automated']
            });
